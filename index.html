<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stok Kaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 12px;
    background-image:
        radial-gradient(ellipse at 20% 50%, rgba(74, 144, 217, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(76, 175, 80, 0.06) 0%, transparent 50%);
}
.container { max-width: 850px; width: 100%; margin-top: 16px; }
.header { text-align: center; margin-bottom: 16px; }
.header h1 { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #64b5f6, #4caf50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
.header .sub { color: #ffffff; font-size: 28px; margin-top: 3px; letter-spacing: 1px; font-weight: 800; }
.total-stock-wrap {
    background: linear-gradient(135deg, rgba(74,144,217,0.08), rgba(76,175,80,0.05));
    border: 1px solid rgba(74,144,217,0.15);
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
    margin-bottom: 12px;
}
.total-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
}
.total-item { display: flex; align-items: center; gap: 5px; }
.total-label { color: #888; font-weight: 500; font-size: 13px; }
.total-angka { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, #64b5f6, #4caf50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.total-operator, .total-sama { color: #555; font-size: 15px; font-weight: 700; }
.total-hasil { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #4caf50, #81c784); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.total-sub { color: #555; font-size: 11px; margin-top: 5px; }
.uang-wrap {
    background: linear-gradient(135deg, rgba(74,144,217,0.06), rgba(76,175,80,0.03));
    border: 1px solid rgba(74,144,217,0.1);
    border-radius: 12px;
    padding: 10px 16px;
    text-align: center;
    margin-bottom: 16px;
}
.uang-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
}
.uang-item { display: flex; align-items: center; gap: 5px; }
.uang-label { color: #777; font-weight: 500; font-size: 12px; }
.uang-nominal { font-size: 17px; font-weight: 800; background: linear-gradient(135deg, #64b5f6, #4caf50); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stok-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.stok-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}
.stok-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #ff0080, #4a00e0);
    opacity: 0; transition: opacity 0.3s;
}
.stok-card:hover { border-color: rgba(255,0,128,0.3); transform: translateY(-2px); }
.stok-card:hover::before { opacity: 1; }
.stok-card .ukuran { font-size: 17px; font-weight: 800; color: #e0e0e0; letter-spacing: 0.5px; }
.stok-card .harga-card { font-size: 10px; color: #81c784; font-weight: 600; background: rgba(76, 175, 80, 0.12); display: inline-block; padding: 2px 8px; border-radius: 8px; margin-top: 3px; }
.stok-card .jumlah { font-size: 32px; font-weight: 800; color: #e0e0e0; margin: 6px 0; line-height: 1; }
.stok-card .stok-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
.stok-card .stok-bar { font-size: 11px; color: #999; margin: 3px 0; }
.stok-card .progress-wrap { background: rgba(255,255,255,0.06); border-radius: 10px; height: 3px; margin: 8px 12px 0; overflow: hidden; }
.stok-card .progress-fill { height: 100%; background: linear-gradient(90deg, #ff0080, #4a00e0); border-radius: 10px; transition: width 0.5s ease; }
.stok-card .actions { margin-top: 10px; display: flex; gap: 6px; justify-content: center; }
.stok-card .actions button { border: none; border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; transition: 0.2s; font-weight: 700; font-family: inherit; }
.stok-card .actions .btn-jual { background: linear-gradient(135deg, #ff0080, #4a00e0); color: white; box-shadow: 0 0 10px rgba(255, 0, 128, 0.25); flex: 1; }
.stok-card .actions .btn-jual:hover { transform: scale(1.05); box-shadow: 0 0 16px rgba(255, 0, 128, 0.4); }
.stok-card .actions .btn-jual:disabled { background: rgba(255,255,255,0.05); color: #444; cursor: not-allowed; transform: none; box-shadow: none; }
.stok-card .actions .btn-back { background: rgba(255,255,255,0.06); color: #888; border: 1px solid rgba(255,255,255,0.1); padding: 6px 8px; font-size: 14px; }
.stok-card .actions .btn-back:hover { background: rgba(76, 175, 80, 0.15); color: #81c784; border-color: rgba(76,175,80,0.3); transform: scale(1.05); }
.input-beli { display: flex; gap: 8px; margin-bottom: 16px; }
.input-beli select, .input-beli input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; font-size: 14px; color: #e0e0e0; font-family: inherit; outline: none; transition: border 0.2s; }
.input-beli .btn-beli-back { background: rgba(255,255,255,0.06); color: #888; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 12px; font-size: 16px; cursor: pointer; font-family: inherit; transition: 0.2s; }
.input-beli .btn-beli-back:hover { background: rgba(76, 175, 80, 0.15); color: #81c784; border-color: rgba(76,175,80,0.3); transform: scale(1.05); }
.input-beli select { flex: 1; }
.input-beli select option { background: #1a1a2e; color: #e0e0e0; }
.input-beli input { width: 70px; text-align: center; }
.input-beli select:focus, .input-beli input:focus { border-color: rgba(255, 0, 128, 0.4); }
.input-beli button {
    background: linear-gradient(135deg, #ff0080, #4a00e0); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 700; font-family: inherit; transition: 0.2s; box-shadow: 0 0 10px rgba(255, 0, 128, 0.25);
}
.input-beli button:hover { transform: scale(1.03); box-shadow: 0 0 16px rgba(255, 0, 128, 0.4); }

/* RINGKASAN PENJUALAN */
.ringkasan {
    display: none;
    background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(255,152,0,0.03));
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 10px;
    animation: fadeR 0.3s ease;
}
@keyframes fadeR { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
.ringkasan .rl { font-size: 12px; font-weight: 700; color: #ffd700; margin-bottom: 6px; letter-spacing: 0.5px; }
.ringkasan .ri { font-size: 12px; color: #e0e0e0; line-height: 1.7; font-family: 'Courier New', monospace; }
.ringkasan .ri .ii { display: flex; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 6px; }
.ringkasan .ri .ii .col1 { width: 48px; display: inline-block; }
.ringkasan .ri .ii .sz { color: #64b5f6; font-weight: 700; font-size: 13px; }
.ringkasan .ri .ii .hrg { color: #e0e0e0; }
.ringkasan .ri .ii .pc { color: #4fc3f7; margin-left: 4px; }
.ringkasan .ri .ii .eq { color: #888; margin: 0 8px; }
.ringkasan .ri .ii:last-child { border: none; }
.ringkasan .rt { margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; font-weight: 700; color: #fff; font-size: 13px; }

.log { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px; max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
.log::-webkit-scrollbar { width: 3px; }
.log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.log p { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); color: #999; font-size: 12px; }
.log p:last-child { border: none; }
.log-title { font-weight: 700; color: #64b5f6; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.empty-log { color: #444; text-align: center; padding: 8px; font-size: 12px; }
.bottom-bar { display: flex; justify-content: space-between; align-items: center; }
.reset-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 6px 16px; font-size: 12px; color: #666; cursor: pointer; font-family: inherit; transition: 0.2s; }
.reset-btn:hover { background: rgba(255,255,255,0.08); color: #999; }
.footer { text-align: center; padding: 16px 0 8px; font-size: 11px; color: #333; letter-spacing: 1px; }

@media (max-width: 700px) {
    body { padding: 10px; }
    .container { margin-top: 10px; }
    .header h1 { font-size: 18px; }
    .header .sub { font-size: 20px; }
    .total-stock-wrap { padding: 12px 14px; }
    .total-row { gap: 8px; font-size: 12px; }
    .total-angka { font-size: 16px; }
    .total-hasil { font-size: 17px; }
    .uang-row { gap: 12px; }
    .uang-nominal { font-size: 15px; }
    .ringkasan { padding: 8px 12px; }
    .ringkasan .ri { font-size: 11px; }
    .stok-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stok-card { padding: 12px 6px; }
    .stok-card .ukuran { font-size: 15px; }
    .stok-card .jumlah { font-size: 26px; }
    .stok-card .actions button { font-size: 12px; padding: 5px 8px; }
    .input-beli select, .input-beli input { font-size: 13px; padding: 8px 10px; }
    .input-beli button { padding: 8px 16px; font-size: 13px; }
}
@media (max-width: 480px) {
    body { padding: 6px; }
    .container { margin-top: 6px; }
    .header h1 { font-size: 16px; }
    .header .sub { font-size: 18px; margin-top: 2px; }
    .total-stock-wrap { padding: 10px 10px; border-radius: 12px; }
    .total-row { gap: 6px; font-size: 11px; }
    .total-label { font-size: 11px; }
    .total-angka { font-size: 14px; }
    .total-hasil { font-size: 15px; }
    .total-operator, .total-sama { font-size: 13px; }
    .total-sub { font-size: 10px; }
    .uang-wrap { padding: 8px 10px; border-radius: 10px; }
    .uang-row { gap: 10px; }
    .uang-label { font-size: 11px; }
    .uang-nominal { font-size: 13px; }
    .ringkasan { padding: 6px 10px; border-radius: 12px; }
    .ringkasan .ri { font-size: 10px; }
    .stok-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .stok-card { padding: 10px 6px; border-radius: 12px; }
    .stok-card::before { height: 2px; }
    .stok-card .ukuran { font-size: 14px; }
    .stok-card .harga-card { font-size: 9px; padding: 1px 6px; }
    .stok-card .jumlah { font-size: 22px; margin: 4px 0; }
    .stok-card .stok-label { font-size: 9px; }
    .stok-card .stok-bar { font-size: 10px; }
    .stok-card .progress-wrap { height: 2px; margin: 6px 8px 0; }
    .stok-card .actions { margin-top: 8px; gap: 4px; }
    .stok-card .actions button { font-size: 11px; padding: 4px 6px; border-radius: 6px; }
    .stok-card .actions .btn-back { padding: 4px 6px; font-size: 12px; }
    .input-beli { gap: 6px; margin-bottom: 12px; }
    .input-beli select, .input-beli input { font-size: 12px; padding: 7px 8px; border-radius: 8px; }
    .input-beli select { min-width: 0; }
    .input-beli input { width: 55px; }
    .input-beli button { padding: 7px 14px; font-size: 12px; border-radius: 8px; }
    .log { padding: 10px; border-radius: 12px; font-size: 11px; }
    .log p { font-size: 11px; padding: 4px 0; }
    .log-title { font-size: 11px; margin-bottom: 6px; }
    .empty-log { font-size: 11px; }
    .reset-btn { font-size: 11px; padding: 5px 12px; }
    .footer { font-size: 10px; padding: 12px 0 6px; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Stok Kaos</h1>
<div class="sub">ANNIV 24 KCDj</div>
</div>

<div class="total-stock-wrap">
<div class="total-row">
    <div class="total-item"><span class="total-label">Stock</span><span class="total-angka" id="totalAwal">0</span></div>
    <span class="total-operator">&minus;</span>
    <div class="total-item"><span class="total-label">Penjualan</span><span class="total-angka" id="totalTerjual">0</span></div>
    <span class="total-sama">=</span>
    <div class="total-item"><span class="total-label">Sisa</span><span class="total-hasil" id="totalSisa">0</span></div>
</div>
<div class="total-sub">Total stok awal &middot; update otomatis</div>
</div>

<div class="uang-wrap">
<div class="uang-row">
    <div class="uang-item"><span class="uang-label">Terjual</span><span class="uang-nominal" id="uangPcs">0 pcs</span></div>
    <span style="color:#444;">&bull;</span>
    <div class="uang-item"><span class="uang-label">Total Masuk</span><span class="uang-nominal" id="uangTotal">Rp0</span></div>
</div>
<div class="total-sub" style="margin-top:4px;">Nominal uang yang sudah masuk</div>
</div>

<div class="stok-grid" id="stokGrid"></div>

<div class="input-beli">
<select id="sizeSelect"></select>
<input type="number" id="jumlahBeli" value="1" min="1" max="99">
<button class="btn-beli-back" onclick="backBeli()" title="Kembalikan">&#8634;</button>
<button onclick="beli()">Jual</button>
</div>

<div class="ringkasan" id="ringkasanBox">
<div class="rl">&#128203; Ringkasan Penjualan</div>
<div class="ri" id="ringkasanList"></div>
</div>

<div class="log">
<div class="log-title">Riwayat Penjualan</div>
<div id="logEntries"><p class="empty-log">Belum ada penjualan</p></div>
</div>

<div class="bottom-bar">
<button class="reset-btn" onclick="resetStok()">&#8635; Reset Stok</button>
<div style="color:#444;font-size:12px;">Qber1292 | v2.0</div>
</div>

<div class="footer">Data tersimpan di browser</div>
</div>

<script>
var UKURAN = ['M', 'L', 'XL', 'XXL', 'XXXL', 'XXXXL', 'XXXXXL', 'XXXXXXL'];
var HARGA = { M:130000, L:130000, XL:130000, XXL:140000, XXXL:150000, XXXXL:160000, XXXXXL:170000, XXXXXXL:180000 };
var AWAL = { M:40, L:350, XL:300, XXL:250, XXXL:50, XXXXL:5, XXXXXL:3, XXXXXXL:2 };
var TOTAL_AWAL = 0; for(var k in AWAL) TOTAL_AWAL += AWAL[k];
var stok = {}, logs = [], sesiJual = {};

function muat(){
    try{
        var s = localStorage.getItem('ks_stok9'), l = localStorage.getItem('ks_logs9');
        if(s) stok = JSON.parse(s);
        if(l) logs = JSON.parse(l);
    }catch(e){}
    for(var i=0;i<UKURAN.length;i++) if(stok[UKURAN[i]] === undefined) stok[UKURAN[i]] = AWAL[UKURAN[i]];
    for(var i=0;i<logs.length;i++){
        if(typeof logs[i] === 'string') logs[i] = {tgl:'--', jam:'--', ukuran:'?', harga:'?'};
    }
}

function simpan(){ localStorage.setItem('ks_stok9', JSON.stringify(stok)); localStorage.setItem('ks_logs9', JSON.stringify(logs)); }

function hitungUang(){
    var uang=0,pcs=0;
    for(var i=0;i<UKURAN.length;i++){
        var u=UKURAN[i], t=AWAL[u]-stok[u];
        if(t>0){pcs+=t; uang+=t*HARGA[u];}
    }
    return {pcs:pcs, uang:uang};
}

function ringkasanUpdate(){
    var keys = [];
    for(var s in sesiJual) if(sesiJual[s] > 0) keys.push(s);
    keys.sort();
    var box = document.getElementById('ringkasanBox');
    var list = document.getElementById('ringkasanList');
    if(keys.length === 0){ box.style.display = 'none'; return; }
    box.style.display = 'block';
    var html = '', tp = 0, tr = 0;
    for(var i=0;i<keys.length;i++){
        var u = keys[i], q = sesiJual[u], r = q * HARGA[u];
        tp += q; tr += r;
        html += '<div class="ii"><span class="sz col1">' + u + '</span><span class="sp">:  </span><span class="hrg">Rp' + HARGA[u].toLocaleString('id-ID') + '</span><span class="pc">+  ' + q + 'pcs</span><span class="eq">=</span><span class="sub">Rp' + r.toLocaleString('id-ID') + '</span></div>';
    }
    html += '<div class="rt"><span>Total</span><span>' + tp + ' pcs - Rp' + tr.toLocaleString('id-ID') + '</span></div>';
    list.innerHTML = html;
}

function update(){
    var ss = 0; for(var i=0;i<UKURAN.length;i++) ss += stok[UKURAN[i]];
    var tt = TOTAL_AWAL - ss, sisa = Math.max(0, ss);
    document.getElementById('totalAwal').textContent = TOTAL_AWAL.toLocaleString('id-ID');
    document.getElementById('totalTerjual').textContent = tt.toLocaleString('id-ID');
    document.getElementById('totalSisa').textContent = sisa.toLocaleString('id-ID');
    var duit = hitungUang();
    document.getElementById('uangPcs').textContent = duit.pcs.toLocaleString('id-ID') + ' pcs';
    document.getElementById('uangTotal').textContent = 'Rp' + duit.uang.toLocaleString('id-ID');
    var mx = 1; for(var i=0;i<UKURAN.length;i++) if(stok[UKURAN[i]] > mx) mx = stok[UKURAN[i]];
    var grid = document.getElementById('stokGrid'); grid.innerHTML = '';
    for(var i=0;i<UKURAN.length;i++){
        var u = UKURAN[i], pct = Math.round((stok[u]/mx)*100), ter = AWAL[u] - stok[u];
        var card = document.createElement('div'); card.className = 'stok-card';
        var disabled = stok[u] <= 0 ? 'disabled' : '';
        card.innerHTML = '<div class="ukuran">' + u + '</div><div class="harga-card">Rp' + HARGA[u].toLocaleString('id-ID') + '</div><div class="stok-bar"><span>Stok: ' + AWAL[u] + ' - ' + ter + '</span></div><div class="jumlah">' + stok[u] + '</div><div class="stok-label">Sisa</div><div class="progress-wrap"><div class="progress-fill" style="width:' + pct + '%"></div></div><div class="actions"><button class="btn-back" onclick="back(\'' + u + '\')" title="Kembalikan 1">&#8634;</button><button class="btn-jual" onclick="jual(\'' + u + '\')" ' + disabled + '>Jual</button></div>';
        grid.appendChild(card);
    }
    var sel = document.getElementById('sizeSelect'); sel.innerHTML = '';
    for(var i=0;i<UKURAN.length;i++){
        var u = UKURAN[i];
        var o = document.createElement('option'); o.value = u; o.textContent = u + ' (' + stok[u] + ') - Rp' + HARGA[u].toLocaleString('id-ID');
        if(stok[u] <= 0) o.disabled = true;
        sel.appendChild(o);
    }
    logUpdate(); simpan();
}

function jual(u){
    if(stok[u] <= 0) return;
    stok[u]--;
    if(!sesiJual[u]) sesiJual[u] = 0;
    sesiJual[u]++;
    var now = new Date();
    var d = ('0'+now.getDate()).slice(-2), m = ('0'+(now.getMonth()+1)).slice(-2), y = now.getFullYear();
    var jam = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
    logs.unshift({tgl:d+'-'+m+'-'+y, jam:jam, ukuran:u+' terjual', harga:HARGA[u].toLocaleString('id-ID')});
    if(logs.length > 100) logs.pop();
    update(); ringkasanUpdate();
}

function back(u){
    if(stok[u] >= AWAL[u]) return;
    stok[u]++;
    if(sesiJual[u] && sesiJual[u] > 0) sesiJual[u]--;
    var now = new Date();
    var d = ('0'+now.getDate()).slice(-2), m = ('0'+(now.getMonth()+1)).slice(-2), y = now.getFullYear();
    var jam = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
    logs.unshift({tgl:d+'-'+m+'-'+y, jam:jam, ukuran:u+' +1', harga:'kembali'});
    if(logs.length > 100) logs.pop();
    update(); ringkasanUpdate();
}

function beli(){
    var u = document.getElementById('sizeSelect').value;
    var j = parseInt(document.getElementById('jumlahBeli').value) || 1;
    if(!u || j < 1){ alert('Pilih ukuran dan jumlah'); return; }
    if(stok[u] < j){ alert('Stok ' + u + ' cuma ' + stok[u]); return; }
    stok[u] -= j;
    if(!sesiJual[u]) sesiJual[u] = 0;
    sesiJual[u] += j;
    var ttl = (j * HARGA[u]).toLocaleString('id-ID');
    var now = new Date();
    var d = ('0'+now.getDate()).slice(-2), m = ('0'+(now.getMonth()+1)).slice(-2), y = now.getFullYear();
    var jam = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
    logs.unshift({tgl:d+'-'+m+'-'+y, jam:jam, ukuran:u+' x'+j, harga:ttl});
    if(logs.length > 100) logs.pop();
    update(); ringkasanUpdate();
}

function backBeli(){
    var u = document.getElementById('sizeSelect').value;
    var j = parseInt(document.getElementById('jumlahBeli').value) || 1;
    if(!u || j < 1){ alert('Pilih ukuran dan jumlah'); return; }
    if(stok[u] + j > AWAL[u]){ alert('Stok ' + u + ' sudah penuh (' + stok[u] + '/' + AWAL[u] + ')'); return; }
    stok[u] += j;
    if(!sesiJual[u]) sesiJual[u] = 0;
    sesiJual[u] = Math.max(0, sesiJual[u] - j);
    var now = new Date();
    var d = ('0'+now.getDate()).slice(-2), m = ('0'+(now.getMonth()+1)).slice(-2), y = now.getFullYear();
    var jam = ('0'+now.getHours()).slice(-2) + ':' + ('0'+now.getMinutes()).slice(-2);
    logs.unshift({tgl:d+'-'+m+'-'+y, jam:jam, ukuran:u+' +'+j, harga:'kembali'});
    if(logs.length > 100) logs.pop();
    update(); ringkasanUpdate();
}

function resetStok(){
    if(!confirm('Reset stok & riwayat?')) return;
    for(var i=0;i<UKURAN.length;i++) stok[UKURAN[i]] = AWAL[UKURAN[i]];
    logs = []; sesiJual = {};
    update(); ringkasanUpdate();
}

function logUpdate(){
    var e = document.getElementById('logEntries');
    if(logs.length === 0){ e.innerHTML = '<p class="empty-log">Belum ada penjualan</p>'; return; }
    var html = '', mx = Math.min(logs.length, 30);
    for(var i=0;i<mx;i++){
        var p = logs[i];
        var label = p.ukuran.indexOf('+1') !== -1 ? '&#8634;' : '&#128176;';
        var warna = p.harga === 'kembali' ? '#666' : '#ffc107';
        var teks = p.harga === 'kembali' ? 'kembali' : 'Rp' + p.harga;
        html += '<p><span style="color:#64b5f6;">' + p.tgl + '</span> <span style="color:#fff;">' + p.jam + '</span> <span style="color:#888;">' + label + ' ' + p.ukuran + '</span> <span style="color:' + warna + ';">' + teks + '</span></p>';
    }
    e.innerHTML = html;
}

muat(); update(); ringkasanUpdate();
</script>
</body>
</html>
